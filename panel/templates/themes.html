{{define "themes.html"}}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"><title>warden — apariencia</title>{{template "_style"}}
  <style>
    .theme-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.65rem; margin-top: 1rem; }
    .theme-swatch { border-radius: 12px; overflow: hidden; cursor: pointer;
                    border: 2px solid var(--border2); transition: border-color 0.2s, transform 0.15s; }
    .theme-swatch:hover { transform: translateY(-2px); border-color: var(--muted); }
    .theme-swatch.active { border-color: var(--accent); }
    .theme-preview { height: 64px; position: relative; }
    .theme-dot { position: absolute; bottom: 7px; left: 9px; width: 10px; height: 10px;
                 border-radius: 50%; box-shadow: 0 0 6px rgba(0,0,0,0.4); }
    .theme-name { padding: 0.45rem 0.7rem; font-size: 0.8rem; font-weight: 500;
                  background: var(--surface); color: var(--text); }

    .wall-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
                 gap: 0.5rem; margin-top: 0.75rem; }
    .wall-thumb { aspect-ratio: 16/9; object-fit: cover; width: 100%; display: block;
                  border-radius: 8px; cursor: pointer; border: 2px solid transparent;
                  transition: border-color 0.15s, transform 0.15s; background: var(--surface2); }
    .wall-thumb:hover { transform: scale(1.02); border-color: var(--muted); }
    .wall-thumb.active { border-color: var(--accent); }

    .wall-actions { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; margin-bottom: 0.5rem; }
    .wall-status { font-size: 0.82rem; color: var(--muted); }
    .section-sep { margin: 1.5rem 0 0; padding-top: 1.5rem; border-top: 1px solid var(--border); }
  </style>
</head>
<body>
  {{template "nav" .}}
  <div class="top"><h1>Apariencia</h1></div>

  <div class="panel">
    <h2>Tema de color</h2>
    <div class="theme-grid" id="theme-grid"></div>
  </div>

  <div class="panel" style="margin-top:1rem">
    <h2>Fondo de pantalla</h2>
    <div class="wall-actions">
      <button class="btn" id="btn-load-walls">Cargar fondos</button>
      <button class="btn secondary" id="btn-remove-wall" style="display:none">Quitar fondo</button>
      <span class="wall-status" id="wall-status"></span>
    </div>
    <div class="wall-grid" id="wall-grid"></div>

    <div class="section-sep">
      <p style="font-size:0.82rem; color:var(--muted); margin:0 0 0.6rem">
        O pegá la URL de cualquier imagen propia:
      </p>
      <div style="display:flex; gap:0.5rem; flex-wrap:wrap">
        <input id="custom-wall-url" type="url" placeholder="https://..." style="flex:1;min-width:200px;max-width:460px">
        <button class="btn" id="btn-apply-custom">Aplicar</button>
      </div>
    </div>
  </div>

          ['color-scheme','light']] },

const CACHE_KEY = 'warden-walls-v1';
const CACHE_TTL = 86400000;

function applyTheme(id) {
  const t = THEMES.find(t => t.id === id);
  if (!t) return;
  const r = document.documentElement.style;
  t.vars.forEach(([k, v]) => {
    if (k === 'color-scheme') document.documentElement.style.colorScheme = v;
    else r.setProperty(k, v);
  });
  localStorage.setItem('warden-theme-id', id);
  localStorage.setItem('warden-theme-vars', JSON.stringify(t.vars));
  document.querySelectorAll('.theme-swatch').forEach(el =>
    el.classList.toggle('active', el.dataset.id === id));
}

function applyWallpaper(url) {
  document.documentElement.classList.add('has-wallpaper');
  document.documentElement.style.setProperty('--wallpaper-url', 'url("' + url + '")');
  localStorage.setItem('warden-wallpaper', url);
  document.getElementById('btn-remove-wall').style.display = '';
  document.querySelectorAll('.wall-thumb').forEach(el =>
    el.classList.toggle('active', el.dataset.url === url));
}

function removeWallpaper() {
  document.documentElement.classList.remove('has-wallpaper');
  document.documentElement.style.removeProperty('--wallpaper-url');
  localStorage.removeItem('warden-wallpaper');
  document.getElementById('btn-remove-wall').style.display = 'none';
  document.querySelectorAll('.wall-thumb').forEach(el => el.classList.remove('active'));
}

// Render swatches
const activeTheme = localStorage.getItem('warden-theme-id') || 'dark';
const activeWall  = localStorage.getItem('warden-wallpaper') || '';
const grid = document.getElementById('theme-grid');
THEMES.forEach(t => {
  const el = document.createElement('div');
  el.className = 'theme-swatch' + (t.id === activeTheme ? ' active' : '');
  el.dataset.id = t.id;
  el.innerHTML = '<div class="theme-preview" style="background:' + t.preview + '">'
    + '<span class="theme-dot" style="background:' + t.dot + '"></span></div>'
    + '<div class="theme-name">' + t.name + '</div>';
  el.onclick = () => applyTheme(t.id);
  grid.appendChild(el);
});

// Wallpaper buttons
if (activeWall) document.getElementById('btn-remove-wall').style.display = '';
document.getElementById('btn-remove-wall').onclick = removeWallpaper;
document.getElementById('btn-apply-custom').onclick = function() {
  const url = document.getElementById('custom-wall-url').value.trim();
  if (url) applyWallpaper(url);
};

function renderWallpapers(files) {
  const wg = document.getElementById('wall-grid');
  wg.innerHTML = '';
  files.forEach(path => {
    const url = 'https://raw.githubusercontent.com/dharmx/walls/main/' + path;
    const img = document.createElement('img');
    img.className = 'wall-thumb' + (url === activeWall ? ' active' : '');
    img.src = url;
    img.loading = 'lazy';
    img.dataset.url = url;
    img.alt = path.split('/').pop().replace(/\.[^.]+$/, '');
    img.title = img.alt;
    img.onclick = () => applyWallpaper(url);
    wg.appendChild(img);
  });
}

// Load from GitHub (with localStorage cache)
document.getElementById('btn-load-walls').onclick = async function() {
  const btn = this;
  const status = document.getElementById('wall-status');
  btn.disabled = true;
  status.textContent = 'Cargando desde GitHub...';

  try {
    const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
    if (cached && Date.now() - cached.ts < CACHE_TTL) {
      renderWallpapers(cached.files);
      status.textContent = cached.files.length + ' fondos cargados (caché)';
      return;
    }

    const resp = await fetch('https://api.github.com/repos/dharmx/walls/git/trees/HEAD?recursive=1');
    if (!resp.ok) throw new Error('GitHub API: ' + resp.status);
    const data = await resp.json();
    const exts = ['.jpg','.jpeg','.png','.webp'];
    const files = data.tree
      .filter(f => f.type === 'blob' && exts.some(e => f.path.toLowerCase().endsWith(e)))
      .map(f => f.path)
      .sort(() => Math.random() - 0.5)
      .slice(0, 80);

    localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), files }));
    renderWallpapers(files);
    status.textContent = files.length + ' fondos cargados';
  } catch(e) {
    status.textContent = 'Error: ' + e.message;
    btn.disabled = false;
  }
};

// Auto-render si hay caché
(function() {
  try {
    const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
    if (cached && Date.now() - cached.ts < CACHE_TTL) {
      renderWallpapers(cached.files);
      document.getElementById('wall-status').textContent = cached.files.length + ' fondos (caché 24h)';
    }
  } catch(e) {}
})();
</script>
