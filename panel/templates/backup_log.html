{{define "backup_log.html"}}
<div id="backup-log-box" {{if .Running}}hx-get="/backups/now-log" hx-trigger="every 2s" hx-swap="outerHTML"{{end}}
     style="margin-top:0.8rem">
  {{if .Done}}<div class="ok-msg">Backup completado. <a href="/backups">Recargá la página</a> para ver el snapshot nuevo.</div>{{end}}
  {{if .Log}}<pre style="max-height:320px;overflow-y:auto;white-space:pre-wrap;font-size:0.8rem;background:rgba(0,0,0,0.25);border-radius:6px;padding:0.75rem;margin-top:0.5rem">{{.Log}}</pre>{{end}}
</div>
{{end}}
