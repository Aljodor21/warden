{{define "system.html"}}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>warden — sistema</title>
  {{template "_style"}}
  <script src="/static/htmx.min.js"></script>
  <script defer src="/static/alpine.min.js"></script>
</head>
<body>
  {{template "nav" .}}
  <div class="panel" style="margin-bottom:1rem">
    <h2>Consumo de RAM</h2>
    <p class="muted" style="margin-top:-0.5rem;margin-bottom:0.8rem">Lo que se ve en el Dashboard es el total del sistema —
      esto es el desglose de quién usa qué.</p>
    <div hx-get="/system/mem" hx-trigger="load" hx-swap="outerHTML">
      <p class="muted" style="font-size:0.85rem">Calculando…</p>
    </div>
  </div>
  <div id="system-status" style="margin-top:1rem">{{template "system_fragment.html" (dict "Sys" .Sys)}}</div>
</body>
</html>
{{end}}
