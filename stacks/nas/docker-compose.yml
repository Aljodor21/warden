# NAS — carpeta compartida por red (Samba), genérico.
# Carpeta vacía en ${WARDEN_DATA:-/srv/warden}/nas — lista para usar desde el día 1.
name: nas

services:
  nas:
    image: dperson/samba:latest
    container_name: nas
    restart: unless-stopped
    ports:
      - "139:139"
      - "445:445"
    # SIN USER/SHARE: la imagen reprocesa esas variables de entorno DESPUÉS
    # del 'command', y eso reescribe (borra) el share definido por nuestros
    # usuarios. La única fuente de verdad son los flags -u/-s que genera
    # post-install.sh / 'warden nas' en /etc/warden/nas/docker-compose.override.yml.
    environment:
      TZ: "${TZ:-UTC}"
    volumes:
      - "${WARDEN_DATA:-/srv/warden}/nas:/share"
