{{define "admin_status.html"}}
{{if .Unlocked}}
<button class="adminbtn unlocked" hx-post="/admin/lock" hx-target="this" hx-swap="outerHTML">🔓 Admin (click para bloquear)</button>
{{else}}
<button class="adminbtn locked" onclick="document.getElementById('admin-modal').showModal()">🔒 Admin</button>
{{if .Err}}<span class="adminerr">{{.Err}}</span>{{end}}
{{end}}
{{end}}
