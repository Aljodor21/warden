{{define "tienda_log.html"}}
<div id="tienda-box"
     {{if .Running}}hx-get="/tienda/import-log" hx-trigger="every 2s" hx-swap="outerHTML"{{end}}
     {{if or .Err .Running .Done .Log}}style="background:var(--surface); border:1px solid var(--border2); border-radius:10px; padding:0.8rem 1rem; box-shadow:0 6px 18px rgba(0,0,0,0.45)"{{end}}>
  {{if .Err}}<div class="err" style="margin:0">{{.Err}}</div>{{end}}
  {{if .Running}}<p class="muted" style="margin:0">Importando, adaptando e instalando… puede tardar (baja la imagen de Docker).</p>{{end}}
  {{if .Done}}<div class="ok-msg" style="margin:0">Listo. Andá al <a href="/">Dashboard</a> para ver la app (y darle click).</div>{{end}}
  {{if .Log}}<pre style="max-height:300px; overflow-y:auto; white-space:pre-wrap; margin:0.5rem 0 0">{{.Log}}</pre>{{end}}
</div>
{{end}}
