name: Docs

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - mkdocs.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Configure git author
        run: |
          git config user.name "Aljodor21"
          git config user.email "alejandro_toro23202@elpoli.edu.co"

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
