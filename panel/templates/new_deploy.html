{{define "new_deploy.html"}}
<!doctype html>
<html lang="es">
<head><meta charset="utf-8"><title>warden — conectar proyecto</title>{{template "_style"}}</head>
<body>
  {{template "nav" .}}
  <div class="top">
    <h1>Conectar un proyecto de GitHub</h1>
    <a class="btn secondary" href="/new">&larr; Volver</a>
  </div>

  <p class="muted">Esto solo describe tu app en el catálogo de warden — NO crea el repo ni lo despliega todavía.
    Al guardar te muestro los pasos que faltan en GitHub.</p>

  <form method="post" action="/new/deploy">
    <label>Nombre — cómo se va a ver en el Dashboard y el Catálogo</label>
    <input name="name" placeholder="Click Counter" required>

    <label>Tag — identificador corto, sin espacios ni mayúsculas (se usa en archivos y comandos)</label>
    <input name="tag" placeholder="click-counter" required>

    <label>URL del repo de GitHub — en GitHub: botón verde "Code" → pestaña "HTTPS" → copiá esa URL</label>
    <input name="install" placeholder="https://github.com/tu-usuario/tu-repo.git" required>

    <label>Puerto — el puerto donde tu app escucha DENTRO del contenedor (mirá tu Dockerfile/docker-compose.yml de esa app: la línea "EXPOSE" o "ports")</label>
    <input name="cfport" placeholder="3000">

    <label>Contenedor principal — el "container_name" de tu docker-compose.yml. Si lo dejás vacío, asumimos que es igual al Tag.</label>
    <input name="container" placeholder="(igual al tag si lo dejás vacío)">

    <label>Subdominio público — opcional, SOLO si querés que cualquiera pueda entrar desde internet con tu dominio</label>
    <input name="cfhost" placeholder="clicks.tudominio.site">

    <p><button class="btn" type="submit">Guardar y ver los próximos pasos</button></p>
  </form>
</body>
</html>
{{end}}
