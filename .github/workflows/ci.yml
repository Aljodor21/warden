name: CI

on: [push, pull_request]

jobs:
  shell:
    name: Revisar scripts (bash -n + shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sintaxis (bash -n)
        run: |
          for f in bin/warden bootstrap.sh lib/*.sh modules/*.sh restore/*.sh; do
            echo "· $f"; bash -n "$f"
          done

      - name: shellcheck
        run: |
          shellcheck --severity=error \
            bin/warden bootstrap.sh lib/*.sh modules/*.sh restore/*.sh

  dry-run:
    name: Bootstrap en seco (Ubuntu 24.04)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Preparar site/site.conf mínimo
        run: |
          mkdir -p site/catalog
          cat > site/site.conf <<'EOF'
          WARDEN_HOSTNAME="warden-ci"
          WARDEN_TIMEZONE="America/Bogota"
          WARDEN_LAN="10.0.0.0/8"
          WARDEN_PRESET="basico"
          WARDEN_BACKUP_UUID=""
          WARDEN_DATA="/srv/warden"
          EOF

      - name: bootstrap.sh --dry-run
        env:
          WARDEN_DRY_RUN: "1"
          WARDEN_CI: "1"
          WARDEN_PRESET: "basico"
        run: sudo --preserve-env=WARDEN_DRY_RUN,WARDEN_CI,WARDEN_PRESET bash bootstrap.sh
