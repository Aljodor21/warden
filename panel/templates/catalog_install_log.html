{{define "catalog_install_log.html"}}
<div id="install-box-{{.Tag}}" {{if .Running}}hx-get="/catalog/install-log?tag={{.Tag}}" hx-trigger="every 2s" hx-swap="outerHTML"{{end}}>
  {{if .Running}}
  <p class="muted">Instalando…</p>
  {{else if .Done}}
  <div class="ok-msg">Listo, ya queda. Recargando…</div>
  <script>setTimeout(function(){ location.reload(); }, 1200);</script>
  {{end}}
  {{if .Log}}<pre style="max-height:240px; overflow-y:auto; white-space:pre-wrap">{{.Log}}</pre>{{end}}
</div>
{{end}}
