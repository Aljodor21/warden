# FileBrowser — gestor de archivos web para la carpeta del NAS, genérico.
# Apunta SOLO a ${WARDEN_DATA}/nas (no al resto de warden) — es la carpeta
# compartida que Al ya usa por Samba, esto da una alternativa vía navegador
# sin pasar por SMB/Dolphin.
name: filebrowser

services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    # root: la imagen corre con un usuario sin permisos de escritura
    # propios — sin esto, falla con "permission denied" al crear su base
    # de datos en /database (visto en vivo: crash loop apenas instalado).
    # Queda igual de confinado: solo ve lo que sus volúmenes montan.
    user: "0:0"
    # --baseurl /files/app: vive en un iframe dentro de la página de
    # Archivos del panel (no reemplaza toda la pantalla) — así el menú de
    # warden queda siempre visible arriba para volver, sin tener que
    # navegar "atrás" adentro de FileBrowser carpeta por carpeta.
    # --noauth: sin login propio — entrar a /files YA exige el admin lock
    # del panel (requireAdmin), pedir credenciales DE NUEVO acá adentro es
    # un segundo candado redundante. Seguro porque nunca se expone más
    # puerto que loopback (ver 'ports' abajo): solo se llega a esto a
    # través del panel.
    command: ["--baseurl", "/files/app", "--noauth"]
    # Publicado SOLO en loopback (127.0.0.1): el panel corre nativo en el
    # host (no en Docker, no puede resolver 'filebrowser' por nombre de
    # servicio) y le habla por localhost — pero nadie en la LAN puede
    # entrar directo a este puerto, solo a través de /files en el panel.
    ports:
      - "127.0.0.1:${FILEBROWSER_PORT:-8095}:80"
    environment:
      TZ: "${TZ:-UTC}"
    volumes:
      - "${WARDEN_DATA:-/srv/warden}/nas:/srv"
      - "${WARDEN_DATA:-/srv/warden}/filebrowser:/database"
