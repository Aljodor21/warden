{{define "app_logs.html"}}
<div hx-get="/app/{{.Tag}}/logs/poll"
     hx-trigger="every 2s"
     hx-target="#log-pre-{{.Tag}}"
     hx-swap="innerHTML"
     hx-on::after-swap="(function(){var el=document.getElementById('log-pre-{{.Tag}}');if(el&&el.scrollHeight-el.scrollTop-el.clientHeight<40)el.scrollTop=el.scrollHeight})()">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.3rem;margin-top:0.5rem">
    <span style="font-size:0.8rem;opacity:0.5">{{.Container}} — últimas 100 líneas · actualiza cada 2s</span>
    <button class="btn secondary"
            style="padding:0.15rem 0.6rem;font-size:0.8rem"
            hx-get="/app/{{.Tag}}/logs/close"
            hx-target="#log-{{.Tag}}"
            hx-swap="innerHTML">Cerrar</button>
  </div>
  <pre id="log-pre-{{.Tag}}"
       class="install-log"
       style="max-height:22rem;overflow-y:auto;white-space:pre-wrap;word-break:break-all">{{.Log}}</pre>
  <script>(function(){var el=document.getElementById('log-pre-{{.Tag}}');if(el)el.scrollTop=el.scrollHeight})();</script>
</div>
{{end}}
